apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: sample-app
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - cluster: dev
            url: https://kubernetes.default.svc
  template:
    metadata:
      name: "{{cluster}}-sample-app"
    spec:
      destination:
        namespace: sample-app
        server: "{{url}}"
      project: default
      source:
        path: dist/apps/sample-app
        repoURL: https://github.com/Hoangvu75/k8s_manifest_2
        targetRevision: HEAD
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
